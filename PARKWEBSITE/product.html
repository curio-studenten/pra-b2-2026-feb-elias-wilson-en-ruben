<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeveloperLand - Het meest leerzame prepark voor het hele gezin!</title>

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="wrapper">
        <img src="images/logo-big-v3.png" alt="Het logo van DeveloperLand met een draaimolen, kasteel, achtbaan en tot slot een gezin op de voorgrond." class="logo hidden-on-sm">
        <h1 class="hidden-on-lg">DeveloperLand</h1>
      </div>
    </div>
  </header>
  <main>
    <div class="wrapper">
      <div class="product-page">

        <div class="product-container">

          <div class="product-image">
            <img src="images/merchandise/mok.JPG" alt="DeveloperLand mok">
          </div>

          <div class="product-info">
            <h2>DeveloperLand Mok</h2>

            <div class="price">€ 4,50</div>

            <p class="product-description">een mok voor hereinereningen van het park waar je naar terug wilt komen!</p>

            <button class="buy-button">in winkelwagen doen voor €4,50</button>

          </div>

        </div>

      </div>
    </div>
  </main>
  <footer>
    <div class="wrapper">
      <div class="copyright">
        &copy; 2020 - 2021  DeveloperLand&nbsp;&nbsp;All Rights Reserved
      </div>
    </div>
  </footer>
</body>
</html>
